name: Docker Build and Tag

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Install Docker
      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io

      # Step 3: Check Docker version
      - name: Verify Docker
        run: docker --version

      # Step 4: Build Docker image (basic)
      - name: Build Docker image
        run: docker build -t my-app:v1.0 .

      # Step 5: Tag Docker image with dynamic version
      - name: Tag Docker image with GitHub run number
        run: docker build -t my-app:${{ github.run_number }} .
